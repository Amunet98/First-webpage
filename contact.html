<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <title>Bimesh's Contact</title>
    <!-- 2026: theme toggle - apply stored choice before first paint to avoid a flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- 2026: theme toggle -->
    <button id="theme-toggle" type="button" aria-label="Switch to light theme">&#9728;</button>
    <h4>My contact details:</h4>
    <ol>
      <li>Phone number: +977-9849458932</li>
      <li>Email Address: pbimesh98@gmail.com</li>
      <li>Sinamangal, Kathmandu, Nepal</li>
      <li><a href="https://www.facebook.com/anumet98">Facebook</a></li>
    </ol>
    <hr>
    <form action="mailto:pbimesh98@gmail.com" method="post" enctype="text/plain">
      <label>Your Name:</label>
      <input type="text" name="yourName" value="">
      <br>
      <br>
      <label>Your Email:</label>
      <input type="email" name="yourEmail" value="">
      <br>
      <br>
      <label>Date of Birth:</label>
      <input type="date" name="yourDOB" value="">
      <br>
      <br>
      <label>Your Message:</label>
      <textarea name="yourMessage" rows="10" cols="30"></textarea>
      <br>
      <br>
      <input type="submit" name="">
    </form>
    <!-- 2026: theme toggle -->
    <script>
      (function () {
        var btn = document.getElementById('theme-toggle');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var stored = null;
        try {
          stored = localStorage.getItem('theme');
        } catch (e) {}
        var isLight = stored ? stored === 'light' : prefersLight;

        function paint() {
          btn.innerHTML = isLight ? '&#9789;' : '&#9728;';
          btn.setAttribute('aria-label', isLight ? 'Switch to dark theme' : 'Switch to light theme');
        }
        paint();

        btn.addEventListener('click', function () {
          isLight = !isLight;
          document.documentElement.dataset.theme = isLight ? 'light' : 'dark';
          try {
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
          } catch (e) {}
          paint();
        });
      })();
    </script>
    </body>
</html>
